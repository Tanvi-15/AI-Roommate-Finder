# nginx.conf
# Reverse proxy for FastAPI backend
# Handles HTTP → HTTPS redirect, WebSocket upgrade, and static file serving

events {
    worker_connections 1024;
}

http {
    # Increase timeouts for long-running WebSocket connections (agent conversations)
    proxy_read_timeout 3600;
    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name roommate.tanviatuldeshpande.com;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        server_name roommate.tanviatuldeshpande.com;

        # SSL certificates (mounted from host via docker-compose volume)
        ssl_certificate /etc/letsencrypt/live/roommate.tanviatuldeshpande.com;/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/roommate.tanviatuldeshpande.com;/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Max upload size (for profile photos — 5MB each, 2 photos)
        client_max_body_size 15M;

        # WebSocket connections (agent chat)
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600;
        }

        # Uploaded user photos (served directly by nginx)
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # All other requests → FastAPI backend
        location / {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}